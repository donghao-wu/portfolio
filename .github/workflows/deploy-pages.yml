# 静态站 → GitHub Pages
#
# 若曾用「Deploy from a branch」部署过，必须改一次设置，否则会与 Actions 冲突：
# 1. 仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」（不要选 branch / folder）
# 2. 若存在仅用于旧部署的 gh-pages 分支，可删除该分支（可选）
# 3. Actions 里若 deploy 任务显示 “Waiting”：Settings → Environments → github-pages → 关闭需审批（或点进 Run 批准）

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Compute Astro base path
        id: astro_base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run build
        env:
          ASTRO_BASE: ${{ steps.astro_base.outputs.base }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
