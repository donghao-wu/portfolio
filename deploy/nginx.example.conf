# =============================================================================
# Astro 静态作品集 — Nginx 站点示例
# =============================================================================
# 1) 本机构建：cd portfolio && npm ci && npm run build
# 2) 把 dist/ 内「所有文件」同步到服务器目录，例如：
#    rsync -avz --delete dist/ user@服务器IP:/var/www/portfolio/
# 3) 复制本文件到站点配置并改 server_name：
#    sudo cp deploy/nginx.example.conf /etc/nginx/sites-available/portfolio
#    sudo ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
# 4) 检查并重载：
#    sudo nginx -t && sudo systemctl reload nginx
# 5) 域名解析 A 记录指向服务器公网 IP；防火墙放行 80/443
# 6) 站点在域名根路径时不要设 ASTRO_BASE；仅在子路径部署时构建需 ASTRO_BASE=/子路径/
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/portfolio;
    index index.html;
    charset utf-8;

    # 证书就绪后：可整段改为 80 → 301 到 https，并启用下方 HTTPS server
    # return 301 https://$host$request_uri;

    # Astro 导出：/works/foo → /works/foo/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 可选：站点自定义 404 页（若 dist 根目录有 404.html）
    error_page 404 /404.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    server_tokens off;
}

